<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="Inter, system-ui, sans-serif">
  <rect width="800" height="500" fill="#fafaf9"/>
  <!-- primary mark -->
  <rect x="60" y="60" width="330" height="230" rx="14" fill="#0d9488"/>
  <circle cx="225" cy="150" r="46" fill="none" stroke="#ffffff" stroke-width="10"/>
  <path d="M225 150 L225 200" stroke="#ffffff" stroke-width="10" stroke-linecap="round"/>
  <text x="225" y="250" fill="#ffffff" font-size="26" font-weight="800" text-anchor="middle" letter-spacing="6">VERDE</text>
  <!-- mono + reversed -->
  <rect x="410" y="60" width="150" height="108" rx="12" fill="#ffffff" stroke="#e7e5e4"/>
  <circle cx="470" cy="105" r="22" fill="none" stroke="#1c1917" stroke-width="5"/>
  <path d="M470 105 L470 128" stroke="#1c1917" stroke-width="5" stroke-linecap="round"/>
  <text x="485" y="150" fill="#1c1917" font-size="12" font-weight="700" text-anchor="middle" letter-spacing="3">VERDE</text>
  <rect x="580" y="60" width="160" height="108" rx="12" fill="#134e4a"/>
  <circle cx="640" cy="105" r="22" fill="none" stroke="#5eead4" stroke-width="5"/>
  <path d="M640 105 L640 128" stroke="#5eead4" stroke-width="5" stroke-linecap="round"/>
  <text x="660" y="150" fill="#5eead4" font-size="12" font-weight="700" text-anchor="middle" letter-spacing="3">VERDE</text>
  <!-- palette -->
  <rect x="410" y="188" width="80" height="102" rx="10" fill="#0d9488"/>
  <rect x="500" y="188" width="80" height="102" rx="10" fill="#134e4a"/>
  <rect x="590" y="188" width="70" height="102" rx="10" fill="#5eead4"/>
  <rect x="670" y="188" width="70" height="102" rx="10" fill="#1c1917"/>
  <!-- type spec -->
  <text x="60" y="345" fill="#1c1917" font-size="44" font-weight="800">Aa</text>
  <text x="130" y="345" fill="#78716c" font-size="18">Inter · Bold / Regular</text>
  <text x="60" y="400" fill="#57534e" font-size="15" font-weight="600" letter-spacing="3">BRAND IDENTITY · LOGO SYSTEM</text>
  <line x1="60" y1="420" x2="740" y2="420" stroke="#e7e5e4" stroke-width="1"/>
  <text x="60" y="455" fill="#a8a29e" font-size="13">Primary mark · Monogram · Reversed · Colour · Type</text>
</svg>
